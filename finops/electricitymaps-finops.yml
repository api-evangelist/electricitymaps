description: >-
  FinOps view of Electricity Maps spend. Electricity Maps licenses grid data per
  signal (carbon intensity, electricity mix, prices, flows, loads) and per zone on
  an annual subscription basis, with bundle, regional, volume, and startup
  discounts. A free non-commercial tier and a time-limited commercial trial exist.
  Cost is driven by the number of signals and zones licensed and the history /
  granularity options, not by per-request metering.
notes: >-
  Exact annual signal prices and discount schedules are not reconciled here;
  request a current quote from Electricity Maps sales during reconciliation.
sources:
- https://www.electricitymaps.com/pricing
- https://portal.electricitymaps.com/docs/api

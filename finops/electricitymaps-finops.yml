meters:
- name: licensed_signals
  description: Number of data signals licensed (carbon intensity, electricity mix, prices, flows, loads), billed annually per signal.
  unit: signals
  aggregation: sum
  dimensions:
  - account
  - signal
- name: licensed_zones
  description: Number of zones licensed across the subscribed signals.
  unit: zones
  aggregation: sum
  dimensions:
  - account
  - zone
- name: history_window
  description: Length of trailing or extended historical data licensed per signal.
  unit: days
  aggregation: max
  dimensions:
  - account
  - signal
- name: temporal_granularity
  description: Data resolution licensed (hourly standard; 15-minute / 5-minute on request).
  unit: granularity
  aggregation: max
  dimensions:
  - account
  - signal
- name: api_requests
  description: Requests made against the API; bounded by per-token plan limits rather than directly metered for billing.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - endpoint
principles:
- name: Visibility
  description: Track which signals and zones are licensed per token and map them to internal teams and products.
- name: Allocation
  description: Issue separate API tokens per workload and tag them to cost centers; signals/zones define the cost surface.
- name: Optimization
  description: License only the signals and zones in use; prefer bundle, regional, volume, and startup discounts; use the free tier and trial before committing.
- name: Accountability
  description: Review the annual signal/zone subscription at renewal against actual usage and product needs.
